<nav class="sidebar">
  <div class="sidebar__brand">SubClub</div>
  <ul class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <li>
        <a [routerLink]="item.route" routerLinkActive="active" class="sidebar__link">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  <div class="sidebar__footer">
    <button type="button" class="sidebar__theme-toggle" (click)="themeService.toggle()">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      <span>{{ themeService.isDark() ? 'Light mode' : 'Dark mode' }}</span>
    </button>
  </div>
</nav>
