<nav class="sidebar">
  <div class="sidebar__brand">SubClub</div>

  <div class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="sidebar__link">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    }

    @if (authStore.isAdmin()) {
      <div class="sidebar__section-label">Admin</div>
      @for (item of adminNavItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="sidebar__link">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    }
  </div>

  <div class="sidebar__footer">
    <a [routerLink]="accountNavItem.route" routerLinkActive="active" class="sidebar__link">
      <mat-icon>{{ accountNavItem.icon }}</mat-icon>
      <span>{{ accountNavItem.label }}</span>
    </a>

    <button type="button" class="sidebar__theme-toggle" (click)="themeService.toggle()">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      <span>{{ themeService.isDark() ? 'Light mode' : 'Dark mode' }}</span>
    </button>
  </div>
</nav>
